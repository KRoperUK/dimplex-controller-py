name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether the change touches library code or CI config. Docs-only PRs
  # skip lint/test matrix but still get a green `ci` gate so the required
  # status check on main stays satisfiable.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            code:
              - 'dimplex_controller/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'poetry.lock'
              - '.pre-commit-config.yaml'
              - '.github/workflows/test.yml'

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        # Pinned to the same version as .pre-commit-config.yaml so the pre-commit
        # and CI invocations of ruff cannot drift.
        run: pip install "ruff==$(grep -A1 'ruff-pre-commit' .pre-commit-config.yaml | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | sed 's/^v//')"

      - name: Lint with ruff
        run: ruff check dimplex_controller/ tests/

      - name: Check formatting
        run: ruff format --check dimplex_controller/ tests/

      - name: Install mypy
        run: pip install mypy

      - name: Type check with mypy
        # Convert mypy output into GitHub annotations (inline on the PR diff) while
        # preserving its exit status via pipefail, so type errors are surfaced on the
        # offending line instead of only in the raw log.
        run: |
          set -o pipefail
          mypy | sed -E \
            -e 's/^([^:]+):([0-9]+): error: (.*)$/::error file=\1,line=\2::\3/' \
            -e 's/^([^:]+):([0-9]+): note: (.*)$/::notice file=\1,line=\2::\3/'

  pre-commit:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit on all files
        # Pre-commit runs the local hook suite (trailing-whitespace, end-of-file-fixer,
        # ruff, ruff-format). It catches drift between the ruff-pre-commit pin and
        # the ruff pin in pyproject.toml.
        run: pre-commit run --all-files --show-diff-on-failure --color=always

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Matches requires-python (>=3.10) in pyproject.toml. 3.13 is added so the
        # library stays forward-compatible with the Python version the consuming
        # Home Assistant integration now targets.
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests with coverage
        run: poetry run pytest --cov=dimplex_controller --cov-report=term-missing

  # Stable required status check for the `main` branch ruleset.
  # - Python/code changes: fails unless lint, pre-commit, and the full test matrix succeed
  # - Docs-only changes: succeeds without running the heavy jobs
  ci:
    name: ci
    needs: [changes, lint, pre-commit, test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enforce required jobs for code changes
        run: |
          set -euo pipefail
          code="${{ needs.changes.outputs.code }}"
          echo "code changes: ${code}"
          echo "lint: ${{ needs.lint.result }}"
          echo "pre-commit: ${{ needs.pre-commit.result }}"
          echo "test: ${{ needs.test.result }}"

          if [ "${code}" != "true" ]; then
            echo "No library/test/CI paths changed — CI gate OK."
            exit 0
          fi

          failed=0
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::error::lint did not succeed (${{ needs.lint.result }})"
            failed=1
          fi
          if [ "${{ needs.pre-commit.result }}" != "success" ]; then
            echo "::error::pre-commit did not succeed (${{ needs.pre-commit.result }})"
            failed=1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::test matrix did not succeed (${{ needs.test.result }})"
            failed=1
          fi
          exit "${failed}"
